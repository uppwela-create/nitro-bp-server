<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NITRO_BP | Register</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#fff;font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:60px 60px;animation:gridPan 40s linear infinite;z-index:0;}
@keyframes gridPan{to{background-position:60px 60px;}}
.scanline{position:fixed;inset:0;z-index:999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,0.012) 3px,rgba(255,255,255,0.012) 4px);}

.wrap{position:relative;z-index:1;width:440px;}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:10px;color:#444;letter-spacing:3px;}
.top-bar::before,.top-bar::after{content:'';flex:1;height:1px;}
.top-bar::before{background:linear-gradient(90deg,transparent,#333);}
.top-bar::after{background:linear-gradient(90deg,#333,transparent);}

.box{
  background:rgba(8,8,8,0.95);border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;padding:45px 40px;backdrop-filter:blur(20px);
  box-shadow:0 0 60px rgba(255,255,255,0.04);position:relative;overflow:hidden;
}
.box::before{content:'';position:absolute;top:0;left:0;width:50px;height:50px;border-top:1px solid rgba(255,255,255,0.3);border-left:1px solid rgba(255,255,255,0.3);border-radius:16px 0 0 0;}
.box::after{content:'';position:absolute;bottom:0;right:0;width:50px;height:50px;border-bottom:1px solid rgba(255,255,255,0.15);border-right:1px solid rgba(255,255,255,0.15);border-radius:0 0 16px 0;}

.logo{font-family:'Orbitron',sans-serif;font-size:32px;font-weight:900;color:#fff;letter-spacing:5px;text-align:center;margin-bottom:4px;text-shadow:0 0 30px rgba(255,255,255,0.8),0 0 60px rgba(255,255,255,0.3);animation:glow 3s ease-in-out infinite alternate;}
@keyframes glow{from{text-shadow:0 0 15px rgba(255,255,255,0.5);}to{text-shadow:0 0 40px rgba(255,255,255,1),0 0 80px rgba(255,255,255,0.4);}}
.subtitle{text-align:center;font-size:10px;color:#444;letter-spacing:4px;margin-bottom:35px;}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);margin-bottom:30px;}

.section-title{font-family:'Orbitron',sans-serif;font-size:9px;color:#555;letter-spacing:3px;margin-bottom:15px;text-align:center;}

.btn-google{
  width:100%;padding:14px;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.15);border-radius:10px;
  color:#fff;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:2px;cursor:pointer;transition:all 0.3s;
  display:flex;align-items:center;justify-content:center;gap:12px;
  text-decoration:none;position:relative;overflow:hidden;
}
.btn-google::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);transition:left 0.4s;}
.btn-google:hover::before{left:100%;}
.btn-google:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.4);box-shadow:0 0 25px rgba(255,255,255,0.1);transform:translateY(-2px);}

.google-icon{width:20px;height:20px;}

.or-divider{display:flex;align-items:center;gap:12px;margin:20px 0;font-size:10px;color:#333;letter-spacing:2px;}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08);}

.more-options{display:flex;gap:10px;}
.btn-provider{
  flex:1;padding:12px;background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);border-radius:8px;
  color:#555;font-family:'Orbitron',sans-serif;font-size:9px;
  letter-spacing:1px;cursor:pointer;transition:all 0.3s;text-align:center;
  text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:6px;
}
.btn-provider:hover{border-color:rgba(255,255,255,0.2);color:#888;background:rgba(255,255,255,0.06);}
.btn-provider span{font-size:18px;}

.bottom{text-align:center;margin-top:25px;font-size:10px;color:#333;letter-spacing:1px;}
.bottom a{color:#666;text-decoration:none;}
.bottom a:hover{color:#fff;}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="wrap">
  <div class="top-bar">NITRO_BP ACCESS</div>
  <div class="box">
    <div class="logo">NITRO_BP</div>
    <div class="subtitle">CREATE YOUR ACCOUNT</div>
    <div class="divider"></div>

    <div class="section-title">// SIGN IN WITH</div>

    <a href="/auth/google" class="btn-google">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      CONTINUE WITH GOOGLE
    </a>

    <div class="or-divider">MORE OPTIONS COMING SOON</div>

    <div class="more-options">
      <div class="btn-provider" style="cursor:not-allowed;opacity:0.4">
        <span>🎮</span>DISCORD
      </div>
      <div class="btn-provider" style="cursor:not-allowed;opacity:0.4">
        <span>✈️</span>TELEGRAM
      </div>
      <div class="btn-provider" style="cursor:not-allowed;opacity:0.4">
        <span>🐦</span>TWITTER
      </div>
    </div>

    <div class="bottom">
      Already have an account? <a href="/auth/google">Sign in</a>
    </div>
  </div>
  <div class="top-bar" style="margin-top:6px">NITRO_BP &copy; 2026</div>
</div>
</body>
</html>
